<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê Shop - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('statistics')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-bar-chart"></i></div>
                        <div>
                            <h1 class="seller-card__title">Thống kê &amp; Phân tích Shop</h1>
                            <p class="seller-card__subtitle">Hiệu suất bán hàng 7 ngày gần nhất</p>
                        </div>
                    </div>
                </div>

                <div class="withdrawal-summary">
                    <div class="balance-highlight">
                        <p class="balance-highlight__label">Doanh thu đang giữ (Escrow)</p>
                        <p class="balance-highlight__value">0 ₫</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-card__label">Tổng số lượng đơn bán</p>
                        <p class="stat-card__value">0 đơn</p>
                    </div>
                </div>

                <div class="seller-section">
                    <h2 class="seller-section__title">Doanh thu 7 ngày gần nhất</h2>
                    <!-- Populated by JS -->
                    <div class="chart-bars">
                        <div style="margin: auto; color: var(--seller-muted);"><i class="fa fa-spinner fa-spin"></i> Đang tải...</div>
                    </div>
                </div>

                <div class="seller-section">
                    <h2 class="seller-section__title">Top sản phẩm bán chạy</h2>
                    <div class="seller-table-wrap">
                        <table class="seller-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Sản phẩm</th>
                                    <th class="text-right">Đã bán</th>
                                    <th class="text-right">Doanh thu</th>
                                </tr>
                            </thead>
                            <tbody id="top-products-tbody">
                                <tr><td colspan="4" style="text-align:center; padding: 20px;"><i class="fa fa-spinner fa-spin"></i> Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/seller-console.js}"></script>
</body>
</html>
