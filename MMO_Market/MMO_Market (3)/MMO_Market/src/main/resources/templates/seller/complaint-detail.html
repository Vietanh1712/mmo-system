<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phản hồi khiếu nại - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('complaints')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-comments"></i></div>
                        <div>
                            <h1 class="seller-card__title">Phản hồi khiếu nại</h1>
                            <p class="seller-card__subtitle">Đang tải thông tin...</p>
                        </div>
                    </div>
                    <span class="badge pending"><i class="fa fa-spinner fa-spin"></i> Đang tải</span>
                </div>

                <!-- Detail info: populated by JS -->
                <dl class="seller-info-grid">
                    <dt>Khách hàng</dt><dd>—</dd>
                    <dt>Mã đơn hàng</dt><dd>—</dd>
                    <dt>Sản phẩm</dt><dd>—</dd>
                    <dt>Đơn giá</dt><dd>—</dd>
                    <dt>Nội dung khiếu nại</dt><dd>—</dd>
                    <dt>Ảnh minh chứng</dt><dd>—</dd>
                    <dt>Hướng giải quyết</dt><dd>—</dd>
                </dl>

                <div class="seller-section">
                    <h2 class="seller-section__title">Kênh trao đổi (ComplaintChats)</h2>
                    <div class="chat-panel">
                        <!-- Chat history: populated by JS -->
                        <div class="chat-messages">
                            <div style="text-align:center; padding: 20px; color: var(--seller-muted);">
                                <i class="fa fa-spinner fa-spin"></i> Đang tải lịch sử tin nhắn...
                            </div>
                        </div>
                        <div class="chat-compose">
                            <label for="sellerReply" style="display:block;margin-bottom:8px;font-weight:600;font-size:14px;">Phản hồi của Seller</label>
                            <textarea id="sellerReply" placeholder="Nhập giải trình, bằng chứng hoặc đề xuất xử lý..."></textarea>
                            <div class="profile-actions" style="margin-top:12px;">
                                <button class="profile-button profile-button--primary" type="button">Gửi phản hồi</button>
                                <a class="profile-button profile-button--secondary" th:href="@{/seller/complaints}">Quay lại danh sách khiếu nại</a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/seller-console.js}"></script>
</body>
</html>
