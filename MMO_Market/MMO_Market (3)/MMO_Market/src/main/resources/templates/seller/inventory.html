<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý kho - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('inventory')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-cubes"></i></div>
                        <div>
                            <h1 class="seller-card__title">Quản lý kho &amp; sản phẩm</h1>
                            <p class="seller-card__subtitle">Danh sách sản phẩm và tồn kho biến thể</p>
                        </div>
                    </div>
                    <a class="profile-button profile-button--primary" th:href="@{/seller/products/new}">+ Đăng bán mới</a>
                </div>

                <div class="seller-table-wrap">
                    <table class="seller-table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Biến thể</th>
                                <th class="text-right">Tồn kho</th>
                                <th>Trạng thái</th>
                                <th class="text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="product-cell">
                                        <div class="product-thumb"><i class="fa fa-film"></i></div>
                                        <div>
                                            <strong>Netflix Premium</strong>
                                            <div class="muted">ID #101</div>
                                        </div>
                                    </div>
                                </td>
                                <td>Streaming</td>
                                <td>3</td>
                                <td class="text-right">47</td>
                                <td><span class="badge ok">Active</span></td>
                                <td class="text-right">
                                    <div th:replace="~{fragments/seller-actions :: productRowActions(@{/seller/products/edit})}"></div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="product-cell">
                                        <div class="product-thumb"><i class="fa fa-music"></i></div>
                                        <div>
                                            <strong>Spotify Family</strong>
                                            <div class="muted">ID #102</div>
                                        </div>
                                    </div>
                                </td>
                                <td>Streaming</td>
                                <td>2</td>
                                <td class="text-right">12</td>
                                <td><span class="badge ok">Active</span></td>
                                <td class="text-right">
                                    <div th:replace="~{fragments/seller-actions :: productRowActions(@{/seller/products/edit})}"></div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="product-cell">
                                        <div class="product-thumb"><i class="fa fa-paint-brush"></i></div>
                                        <div>
                                            <strong>Canva Pro</strong>
                                            <div class="muted">ID #103</div>
                                        </div>
                                    </div>
                                </td>
                                <td>Phần mềm</td>
                                <td>1</td>
                                <td class="text-right">0</td>
                                <td><span class="badge locked"><i class="fa fa-lock"></i> Hết hàng</span></td>
                                <td class="text-right">
                                    <div th:replace="~{fragments/seller-actions :: productRowActions(@{/seller/products/edit})}"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
