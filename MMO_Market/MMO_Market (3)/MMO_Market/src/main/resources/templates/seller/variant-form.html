<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${variantMode == 'edit'} ? 'Sửa biến thể' : 'Thêm biến thể'">Biến thể sản phẩm - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('inventory')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-tags"></i></div>
                        <div>
                            <h1 class="seller-card__title" th:text="${variantMode == 'edit'} ? 'Cập nhật biến thể' : 'Tạo biến thể mới'">Tạo biến thể mới</h1>
                            <p class="seller-card__subtitle">Sản phẩm: Tài khoản Netflix Premium</p>
                        </div>
                    </div>
                    <a class="profile-button profile-button--secondary" th:href="@{/seller/products/edit}">← Quay lại sản phẩm</a>
                </div>

                <form class="profile-edit-form seller-form-panel" novalidate>
                    <div class="profile-edit-form__group">
                        <label for="variantName">Tên biến thể</label>
                        <input id="variantName" type="text"
                               th:value="${variantMode == 'edit'} ? '1 tháng — 1 màn hình' : ''"
                               placeholder="VD: 1 tháng — 1 màn hình">
                    </div>
                    <div class="profile-edit-form__group">
                        <label for="priceVnd">Giá bán (VNĐ)</label>
                        <input id="priceVnd" type="number"
                               th:value="${variantMode == 'edit'} ? '89000' : ''"
                               placeholder="89000">
                    </div>
                    <div class="profile-edit-form__group">
                        <label for="stock">Số lượng tồn kho</label>
                        <input id="stock" type="number"
                               th:value="${variantMode == 'edit'} ? '25' : ''"
                               placeholder="0">
                    </div>
                    <div class="profile-edit-form__group">
                        <label for="status">Trạng thái</label>
                        <select id="status" style="width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:8px;font:inherit;">
                            <option selected>Active</option>
                            <option>Inactive</option>
                        </select>
                    </div>
                    <div class="profile-edit-form__group" th:if="${variantMode == 'edit'}">
                        <label>Kho tài sản số (DigitalAssets)</label>
                        <p class="profile-edit-form__hint">Biến thể này có 25 tài khoản/key trong kho. Quản lý chi tiết sẽ có ở phiên bản sau.</p>
                    </div>

                    <div class="profile-actions">
                        <button class="profile-button profile-button--primary" type="button" disabled
                                th:text="${variantMode == 'edit'} ? 'Cập nhật biến thể' : 'Tạo biến thể'">Tạo biến thể</button>
                        <a class="profile-button profile-button--secondary" th:href="@{/seller/products/edit}">Hủy</a>
                    </div>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
