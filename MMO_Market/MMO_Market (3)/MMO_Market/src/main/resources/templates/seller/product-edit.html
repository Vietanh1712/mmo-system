<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sản phẩm - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('inventory')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-pencil"></i></div>
                        <div>
                            <h1 class="seller-card__title">Chỉnh sửa sản phẩm</h1>
                            <p class="seller-card__subtitle">Sản phẩm #101 — Netflix Premium</p>
                        </div>
                    </div>
                    <a class="profile-button profile-button--secondary" th:href="@{/seller/inventory}">← Quay lại kho</a>
                </div>

                <form class="profile-edit-form seller-form-panel" novalidate>
                    <div class="profile-edit-form__group">
                        <label for="productName">Tên sản phẩm</label>
                        <input id="productName" type="text" value="Tài khoản Netflix Premium">
                    </div>
                    <div class="profile-edit-form__group">
                        <label for="category">Danh mục</label>
                        <select id="category" style="width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:8px;font:inherit;">
                            <option selected>Streaming</option>
                            <option>Phần mềm</option>
                            <option>Game</option>
                        </select>
                    </div>
                    <div class="profile-edit-form__group">
                        <label for="description">Mô tả</label>
                        <input id="description" type="text" value="Tài khoản Netflix Premium chính chủ, bảo hành 30 ngày.">
                    </div>

                    <div class="profile-actions">
                        <button class="profile-button profile-button--primary" type="button" disabled>Lưu sản phẩm</button>
                    </div>
                </form>

                <div class="seller-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                        <h2 class="seller-section__title" style="margin:0;">Biến thể sản phẩm</h2>
                        <a class="profile-button profile-button--primary" th:href="@{/seller/variants/new}">+ Thêm biến thể</a>
                    </div>
                    <div class="seller-table-wrap">
                        <table class="seller-table">
                            <thead>
                                <tr>
                                    <th>Tên biến thể</th>
                                    <th class="text-right">Giá (VNĐ)</th>
                                    <th class="text-right">Tồn kho</th>
                                    <th>Trạng thái</th>
                                    <th class="text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1 tháng — 1 màn hình</td>
                                    <td class="text-right">89.000</td>
                                    <td class="text-right">25</td>
                                    <td><span class="badge ok">Active</span></td>
                                    <td class="text-right">
                                        <div th:replace="~{fragments/seller-actions :: variantRowActions(@{/seller/variants/edit})}"></div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>3 tháng — 1 màn hình</td>
                                    <td class="text-right">249.000</td>
                                    <td class="text-right">15</td>
                                    <td><span class="badge ok">Active</span></td>
                                    <td class="text-right">
                                        <div th:replace="~{fragments/seller-actions :: variantRowActions(@{/seller/variants/edit})}"></div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>1 năm — 4K HDR</td>
                                    <td class="text-right">890.000</td>
                                    <td class="text-right">7</td>
                                    <td><span class="badge ok">Active</span></td>
                                    <td class="text-right">
                                        <div th:replace="~{fragments/seller-actions :: variantRowActions(@{/seller/variants/edit})}"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/seller-console.js}"></script>
</body>
</html>
