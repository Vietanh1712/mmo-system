<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cờ cảnh báo Shop - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/seller.css}">
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="seller-page">
        <div class="seller-layout">
            <aside th:replace="~{fragments/seller-sidebar :: sellerSidebar('shop-flags')}"></aside>

            <section class="seller-card">
                <div class="seller-card__header">
                    <div class="seller-card__header-main">
                        <div class="seller-card__icon"><i class="fa fa-flag"></i></div>
                        <div>
                            <h1 class="seller-card__title">Cờ cảnh báo Shop</h1>
                            <p class="seller-card__subtitle">Theo dõi cảnh báo vi phạm từ Staff — ShopFlags</p>
                        </div>
                    </div>
                </div>

                <!-- Dynamic stat cards -->
                <div class="stat-grid">
                    <div class="stat-card">
                        <p class="stat-card__label">Tổng cờ cảnh báo</p>
                        <p class="stat-card__value" id="totalFlags">0</p>
                        <p class="stat-card__hint">Tất cả mức độ</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-card__label">Mức Warning</p>
                        <p class="stat-card__value" id="warningCount">0</p>
                        <p class="stat-card__hint">Cần cải thiện</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-card__label">Mức Critical</p>
                        <p class="stat-card__value" id="criticalCount">0</p>
                        <p class="stat-card__hint">Nguy cơ bị khóa</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-card__label">Liên quan khiếu nại</p>
                        <p class="stat-card__value" id="flagWithComplaint">0</p>
                        <p class="stat-card__hint">Gắn Complaint ID</p>
                    </div>
                </div>

                <div class="seller-section">
                    <h2 class="seller-section__title">Danh sách cờ cảnh báo</h2>

                    <!-- Dynamic flag cards will be rendered here -->
                    <div class="flag-list" id="flagListContainer">
                        <div style="text-align:center; padding: 30px; color: var(--seller-muted);">
                            <i class="fa fa-spinner fa-spin"></i> Đang tải dữ liệu...
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/seller-console.js}"></script>
</body>
</html>
