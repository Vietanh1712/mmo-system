<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO Market - Đặt lại mật khẩu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/authen/authen.css}">
    <style>
        .step-container {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Style riêng cho nút gửi lại lúc bị disable đếm ngược */
        .resend-text a.disabled {
            color: rgba(255,255,255,0.5) !important;
            text-decoration: none !important;
            cursor: default !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="auth-layout">

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="login-wrap">
        <h3>Đặt lại mật khẩu</h3>

        <div id="reset-msg" class="message"></div>

        <form id="resetPasswordForm">

            <div id="step-1" class="step-container">
                <p class="verify-text" style="margin-bottom: 20px;">
                    Vui lòng nhập mã xác thực (OTP) đã được gửi đến email của bạn.
                </p>

                <div class="form-group">
                    <label style="display:block; margin-bottom: 5px; font-size: 13px; color: rgba(255,255,255,0.7);">Mã xác thực OTP (6 chữ số):</label>
                    <input type="text" id="reset-otp" name="otp" class="form-control otp-input" maxlength="6" autocomplete="off" placeholder="••••••">
                    <small id="reset-otp-error" class="field-error"></small>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <button type="button" class="btn btn-primary" id="btnNextStep">
                        <span>TIẾP TỤC</span>
                    </button>
                </div>

                <div class="resend-text" style="margin-top: 15px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.7);">
                    Không nhận được mã? <a href="#" id="resendOtp" style="color: #fff; text-decoration: underline;">Gửi lại</a>
                </div>
            </div>

            <div id="step-2" class="step-container" style="display: none;">
                <p class="verify-text" style="margin-bottom: 20px; color: #2ecc71;">
                    <i class="fas fa-check-circle"></i> Mã hợp lệ. Hãy thiết lập mật khẩu mới.
                </p>

                <div class="form-group password-group">
                    <label>Mật khẩu mới:</label>
                    <div class="input-wrapper">
                        <input type="password" id="new-password" name="newPassword" class="form-control" placeholder="Ít nhất 6 ký tự, 1 chữ HOA, 1 đặc biệt">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('new-password', this)"></i>
                    </div>
                    <small id="new-password-error" class="field-error"></small>
                </div>

                <div class="form-group password-group">
                    <label>Xác nhận mật khẩu mới:</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" class="form-control" placeholder="Nhập lại mật khẩu mới">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password', this)"></i>
                    </div>
                    <small id="confirm-password-error" class="field-error"></small>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <button type="button" class="btn btn-primary" id="btnSubmitReset">
                        <span>LƯU MẬT KHẨU</span>
                    </button>
                </div>

                <div class="toggle-link" style="margin-top: 15px;">
                    <a id="btnBackToStep1" style="color: rgba(255,255,255,0.6); cursor: pointer;"><i class="fas fa-arrow-left"></i> Quay lại</a>
                </div>
            </div>

        </form>

        <div class="toggle-link" id="login-link-container">
            Quay lại <a th:href="@{/login}">Đăng nhập</a>
        </div>
        <div class="back-home">
            <a href="/">← Về trang chủ</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>

</body>
</html>
