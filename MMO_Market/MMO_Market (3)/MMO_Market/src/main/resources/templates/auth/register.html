<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/authen/authen.css">


</head>
<body class="auth-layout">

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="login-wrap">
        <h3>Tạo tài khoản</h3>

        <div id="alert-message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Họ và tên">
                <small id="fullName-error" class="field-error"></small>
            </div>

            <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="Địa chỉ Email">
                <small id="email-error" class="field-error"></small>
            </div>

            <div class="form-group">
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Số điện thoại (Tùy chọn)">
                <small id="phone-error" class="field-error"></small>
            </div>

            <div class="form-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu">
                <small id="password-error" class="field-error"></small>
            </div>


            <button type="submit" class="btn btn-primary" id="btnRegister">
                <span>Tạo tài khoản</span>
            </button>
        </form>

        <div class="toggle-link">
            Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>

</body>
</html>
