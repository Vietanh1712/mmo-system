<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/authen/authen.css}">

</head>
<body class="auth-layout">

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="login-wrap">
        <h3>Xác thực tài khoản</h3>

        <p class="verify-text">Chúng tôi đã gửi mã gồm 6 chữ số đến <br><span class="display-email" id="displayEmail">email của bạn</span></p>

        <div id="alert-message" class="message"></div>

        <form id="verifyOtpForm">
            <div class="form-group">
                <input type="text" class="form-control otp-input" id="otp" name="otp" maxlength="6" autocomplete="off" placeholder="••••••">
                <small id="otp-error" class="field-error"></small>
            </div>

            <button type="submit" class="btn btn-primary" id="btnVerify">
                <span>Xác thực</span>
            </button>
        </form>

        <div class="resend-text">
            Không nhận được mã? <a href="#" id="resendOtp">Gửi lại</a><br>
            hoặc <a th:href="@{/register}" style="color: rgba(255,255,255,0.8); text-decoration: underline; margin-top: 5px; display: inline-block;">Thay đổi email</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>

</body>
</html>
