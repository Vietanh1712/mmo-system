<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="seller-sidebar" th:fragment="sellerSidebar(activeMenu)">
    <div class="seller-sidebar__shop">
        <div class="seller-sidebar__avatar">S</div>
        <div class="seller-sidebar__identity">
            <strong class="seller-sidebar__name">Shop MMO Pro</strong>
            <span class="seller-sidebar__status" data-seller-shop-status>Trạng thái: Active</span>
        </div>
    </div>

    <div class="seller-sidebar__wallet">
        <div>
            <span class="seller-sidebar__wallet-label">Số dư khả dụng</span>
            <strong class="seller-sidebar__balance">12.450.000 VNĐ</strong>
        </div>
    </div>

    <nav class="seller-sidebar__menu" aria-label="Menu người bán">
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'dashboard'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/dashboard}">
            <i class="fa fa-dashboard" aria-hidden="true"></i>
            <span>Tổng quan</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'shop-info'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/shop-info}">
            <i class="fa fa-shopping-basket" aria-hidden="true"></i>
            <span>Thông tin cửa hàng</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'product-add'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/products/new}">
            <i class="fa fa-plus-square-o" aria-hidden="true"></i>
            <span>Đăng bán sản phẩm</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'inventory'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/inventory}">
            <i class="fa fa-cubes" aria-hidden="true"></i>
            <span>Quản lý kho</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'transactions'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/transactions}">
            <i class="fa fa-exchange" aria-hidden="true"></i>
            <span>Lịch sử bán hàng</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'withdrawals'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/withdrawals}">
            <i class="fa fa-money" aria-hidden="true"></i>
            <span>Rút tiền</span>
        </a>
        <a class="seller-sidebar__menu-link"
           th:classappend="${activeMenu == 'statistics'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/statistics}">
            <i class="fa fa-bar-chart" aria-hidden="true"></i>
            <span>Thống kê</span>
        </a>
        <a class="seller-sidebar__menu-link seller-sidebar__menu-link--danger"
           th:classappend="${activeMenu == 'close-shop'} ? ' seller-sidebar__menu-link--active' : ''"
           th:href="@{/seller/close-shop}">
            <i class="fa fa-power-off" aria-hidden="true"></i>
            <span>Đóng cửa hàng</span>
        </a>
    </nav>
</aside>

</body>
</html>
