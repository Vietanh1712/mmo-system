<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>MMO Market Filter Search Export</title>
    <link rel="stylesheet" href="../../../src/main/resources/static/css/design-system.css">
    <link rel="stylesheet" href="../../../src/main/resources/static/css/forms.css">
    <link rel="stylesheet" href="../../../src/main/resources/static/css/datepicker.css">
    <link rel="stylesheet" href="../../../src/main/resources/static/css/buttons.css">
    <link rel="stylesheet" href="../../../src/main/resources/static/css/filters.css">
</head>
<body class="ds-page">
    <h1 class="ds-page-title">Filter / Search</h1>
    <p class="ds-page-subtitle">MMO Market có search/filter/dropdown search/date range bằng custom datepicker.</p>
    <section class="ds-card" style="margin-top:24px">
        <div class="ds-filter-panel">
            <h2 class="ds-card-title">Danh sách lớp học</h2>
            <div class="ds-filter-grid">
                <input class="ds-input" placeholder="Tìm tên/mã lớp">
                <input class="ds-input" placeholder="Tên giáo viên">
                <div class="ds-dropdown">
                    <button class="ds-dropdown-toggle">Trạng thái <span>⌄</span></button>
                    <div class="ds-dropdown-panel">
                        <div class="ds-dropdown-search"><input class="ds-input" placeholder="Tìm trạng thái"></div>
                        <button class="ds-dropdown-option">Tất cả</button>
                        <button class="ds-dropdown-option">Đang hoạt động</button>
                        <button class="ds-dropdown-option">Tạm dừng</button>
                    </div>
                </div>
            </div>
            <div class="ds-filter-grid" style="grid-template-columns:repeat(2,minmax(220px,1fr));max-width:520px">
                <div class="ds-form-field">
                    <label class="ds-label">Từ ngày</label>
                    <div class="ds-datepicker" data-ds-datepicker>
                        <input type="hidden" name="dateFrom" data-ds-date-value>
                        <div class="ds-datepicker-field">
                            <input class="ds-datepicker-input" type="text" placeholder="dd/mm/yyyy" data-ds-date-display>
                            <button type="button" class="ds-datepicker-button" data-ds-date-toggle aria-label="Chọn từ ngày">▣</button>
                        </div>
                    </div>
                </div>
                <div class="ds-form-field">
                    <label class="ds-label">Đến ngày</label>
                    <div class="ds-datepicker" data-ds-datepicker>
                        <input type="hidden" name="dateTo" data-ds-date-value>
                        <div class="ds-datepicker-field">
                            <input class="ds-datepicker-input" type="text" placeholder="dd/mm/yyyy" data-ds-date-display>
                            <button type="button" class="ds-datepicker-button" data-ds-date-toggle aria-label="Chọn đến ngày">▣</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ds-filter-actions">
                <button class="ds-btn ds-btn-secondary">Làm mới bộ lọc</button>
                <button class="ds-btn ds-btn-primary">Tìm kiếm</button>
            </div>
        </div>
    </section>
    <script src="../../../src/main/resources/static/js/datepicker.js"></script>
</body>
</html>
