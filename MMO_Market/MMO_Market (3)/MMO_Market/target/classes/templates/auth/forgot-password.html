<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO Market - Quên mật khẩu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/authen/authen.css}">
</head>
<body class="auth-layout">

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="login-wrap">
        <div class="auth-logo">
            <span>💎</span>
            MMO Market
        </div>
        <h3>Quên mật khẩu</h3>

        <p style="text-align: center; color: #555; font-size: 14px; margin-bottom: 25px;">
            Nhập email của bạn để nhận mã khôi phục.
        </p>

        <div id="forgot-msg" class="message"></div>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <input type="email" id="forgot-email" name="email" class="form-control" placeholder="Địa chỉ email của bạn" autocomplete="off">
                <small id="forgot-email-error" class="field-error"></small>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary" id="btnForgot">
                    <span>GỬI MÃ KHÔI PHỤC</span>
                </button>
            </div>
        </form>

        <div class="toggle-link">
            Quay lại <a th:href="@{/login}">Đăng nhập</a>
        </div>
        <div class="back-home">
            <a href="/">← Về trang chủ</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>

</body>
</html>
