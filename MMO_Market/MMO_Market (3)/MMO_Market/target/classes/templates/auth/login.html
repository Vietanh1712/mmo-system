<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MMO Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/authen/authen.css">


    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-layout">

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="container">
    <div class="login-wrap">
        <div class="auth-logo">
            <span>💎</span>
            MMO Market
        </div>
        <h3>Đăng nhập</h3>

        <div id="alert-message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="Địa chỉ Email">
                <small id="email-error" class="field-error"></small>
            </div>

            <div class="form-group">
                <div class="input-wrapper auth-password-wrapper">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu" autocomplete="current-password">
                    <button class="toggle-password auth-toggle-password" type="button" aria-label="Hiển thị mật khẩu" data-toggle-password="password">
                        <i class="fa fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                <small id="password-error" class="field-error"></small>
            </div>

            <a href="/forgot-password" class="forgot-link">Quên mật khẩu?</a>

            <button type="submit" class="btn btn-primary" id="btnLogin">
                <span>Đăng nhập</span>
            </button>
        </form>

        <div class="divider">HOẶC</div>

        <button class="btn btn-google" id="googleLoginButton" type="button">
            <img
                    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                    alt="Google"
                    width="20"
                    height="20">

            Đăng nhập với Google
        </button>

        <div class="toggle-link">
            Chưa có tài khoản? <a href="/register">Đăng ký tại đây</a>
        </div>
        <div class="back-home">
            <a href="/">← Về trang chủ</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>

</body>
</html>
